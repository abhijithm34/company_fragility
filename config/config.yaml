project:
  name: corporate_fragility_early_warning

paths:
  project_root: .
  raw_financials: raw_financials.csv
  data_raw_dir: data/raw
  data_interim_dir: data/interim
  data_processed_dir: data/processed
  models_dir: models
  figures_dir: figures

data:
  id_cols:
    - Company
    - Quarter
  feature_cols:
    - X1
    - X2
    - X3
    - X4
    - X5
    - OCF_TA
    - Interest_Coverage
    - Debt_Assets
    - Repo_Rate
    - Leverage_Repo
  target_col: Stress_Label

training:
  test_fraction: 0.2
  random_state: 42

